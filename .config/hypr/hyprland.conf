# -----------------------------------------------------------------------
# HYPRLAND CONFIGURATION - MIGRATED FOR DANK MATERIAL SHELL
# -----------------------------------------------------------------------

# --- MONITOR CONFIGURATION ---
# DMS 1.2 Modular Configuration
source = ~/.config/hypr/dms/outputs.conf
source = ~/.config/hypr/dms/layout.conf
source = ~/.config/hypr/dms/cursor.conf
source = ~/.config/hypr/dms/binds.conf
source = ~/.config/hypr/workspaces.conf

# El fallback ahora está dentro de dms/outputs.conf


# --- STARTUP ---
# Iniciar Dank Material Shell
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = systemctl --user start hyprland-session.target
# exec-once = dms run
# Clipboard manager
# exec-once = wl-paste --watch cliphist store & # REMOVED FOR DMS 1.2 NATIVE CLIPBOARD

# --- XWAYLAND ---
# Desactivado escalado forzado porque no solucionó lo del mouse y puede afectar posición
# xwayland {
#   force_zero_scaling = true
# }

# --- INPUT & KEYBOARD ---
input {
    kb_layout = us
    kb_variant = altgr-intl
    kb_model = pc105
    follow_mouse = 1
    touchpad {
        natural_scroll = false
    }
    sensitivity = 0
}

# --- WINDOW RULES ---
# Reglas esenciales para que DMS se vea bien
windowrule = float on, match:class ^(org.quickshell)$
windowrule = center on, match:class ^(org.quickshell)$
windowrule = center on, match:class ^(dms)$
windowrule = animation off, match:class ^(dms)$
windowrule = opacity 0.9 0.9, match:float 0, match:focus 0
windowrule = border_size 0, match:class ^(wezterm)$
windowrule = border_size 0, match:class ^(thunar)$

# REGLAS PARA EL FILE PICKER (Arregla el marco transparente y permite redimensionar)
windowrule = float on, match:class ^(xdg-desktop-portal-gtk)$
windowrule = size 900 600, match:class ^(xdg-desktop-portal-gtk)$
windowrule = center on, match:class ^(xdg-desktop-portal-gtk)$
windowrule = suppress_event maximize, match:class ^(xdg-desktop-portal-gtk)$
windowrule = no_shadow on, match:class ^(xdg-desktop-portal-gtk)$

